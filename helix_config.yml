feeds:
  - provider: binace
    markets: [ crypto ]
    db_location: "/db/kraken.duckdb"
    log_location: "logs/kraken.log"
    max_reconnect_attempts: 5
    reconnect_delay_secs: 5
    buffer_capacity: 1000
    buffer_swap_trigger: 0.8
    r2_bucket: "helixfeed-archive"
    r2_upload_schedule: "weekly"
    symbols:
      - symbol: BTC/USD
        data:
          - feed_type: trades
            mode: normalized
          - feed_type: book
            mode: raw